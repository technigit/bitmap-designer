[project]
name = "bitmap-designer"
version = "0.1.0"
description = "A text-based utility to design bitmaps and convert them into JS code"
requires-python = ">=3.11"
dependencies = [
    "textual>=0.60.0",
]

[project.scripts]
bitmap-designer = "bitmap_designer.run:main"

[build-system]
requires = ["setuptools>=61.0"]
build-backend = "setuptools.build_meta"